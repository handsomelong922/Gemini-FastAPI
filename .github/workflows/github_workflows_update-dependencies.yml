name: Update Dependencies

on:
  schedule:
    # 每周一凌晨运行
    - cron: '0 0 * * 1'
  workflow_dispatch:  # 允许手动触发

jobs:
  update-dependencies:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          export PATH="/root/.cargo/bin:$PATH"
      
      - name: Update requirements.txt
        run: |
          if [ -f requirements.txt ]; then
            uv pip compile requirements.txt --upgrade --output-file requirements.txt
          fi
      
      - name: Update from pyproject.toml
        run: |
          if [ -f pyproject.toml ]; then
            # 更新锁文件或生成新的requirements.txt
            uv pip compile pyproject.toml --output-file requirements-from-pyproject.txt
          fi
      
      - name: Commit and push if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git diff --quiet && git diff --staged --quiet || (git commit -m "自动更新依赖项 $(date +'%Y-%m-%d')" && git push)
