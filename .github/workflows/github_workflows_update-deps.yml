name: Automated Dependency Update

on:
  schedule:
    - cron: '0 0 * * 0'    # every Sunday at 00:00 UTC
  workflow_dispatch:      # allow manual runs

jobs:
  update-dependencies:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # fetch full history so we can detect changes
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: pip install uv

      - name: Sync dependencies
        run: uv sync

      - name: Detect changes
        id: detect_changes
        run: |
          # exit-code 0 if no changes; non-zero if diff exists
          git diff --exit-code pyproject.toml uv.lock || echo "::set-output name=changed::true"

      - name: Create Pull Request
        if: steps.detect_changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: chore: automated dependency update
          title: chore: Automated Dependency Update
          body: |
            This PR was created automatically by GitHub Actions to update the project dependencies.
          branch: auto/update-deps
          delete-branch: true
