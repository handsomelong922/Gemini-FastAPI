name: Automated Dependency Update

on:
  schedule:
    - cron: '0 0 * * 0'    # every Sunday at 00:00 UTC
  workflow_dispatch:      # manual trigger

jobs:
  update-dependencies:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # fetch full history so diffs work

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: pip install uv

      - name: Sync dependencies
        run: uv sync

      - name: Create Pull Request if changes
        uses: peter-evans/create-pull-request@v6
        with:
          # Use the automatic GITHUB_TOKEN provided by GitHub Actions
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: chore: automated dependency update
          branch: auto/deps-update-${{ github.run_number }}
          title: chore: automated dependency update
          body: |
            This pull request was generated automatically by GitHub Actions.
            - Ran `uv sync`
            - Committed updated `uv.lock` (and `pyproject.toml` if modified)
          labels: automated, dependencies
          delete-branch: true
